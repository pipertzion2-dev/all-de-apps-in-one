version: "3.9"
services:
  backend:
    build:
      context: ./backend
    image: v1-standard-backend:latest
    container_name: v1_standard_backend
    environment:
      - HOST=0.0.0.0
      - PORT=8007
      - APP_VERSION=v1
      - STYLE_SLUG=standard
      - AI_PROVIDER=${AI_PROVIDER:-ollama}
      - AI_MODEL=${AI_MODEL:-llama3.1}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - OPENAI_API_KEY
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
    ports:
      - "8007:8007"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.production
    image: v1-standard-frontend:latest
    container_name: v1_standard_frontend
    environment:
      - API_URL=http://backend:8007
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - backend

  # Optional Nginx reverse proxy to unify under one host
  proxy:
    image: nginx:alpine
    container_name: v1_standard_proxy
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend

