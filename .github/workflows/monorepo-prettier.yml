# Enforces root Prettier (.prettierignore skips vendor drops and lockfiles).
name: Monorepo Prettier

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run format:check
