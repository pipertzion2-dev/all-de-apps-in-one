<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>JSON Only Chat Sandbox – Free Validator | Svivva</title>
<meta name="description" content="Free JSON only chat sandbox. Write a schema, send chat messages, and validate that every AI response is valid JSON matching your schema."/>
<style>
@font-face{font-family:'Zc';src:url('/fonts/Zc-Regular.ttf') format('truetype')}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Zc',system-ui,sans-serif;background:#0a0a0f;color:#e5e5e5;min-height:100vh;padding:24px 16px}
.wrap{max-width:820px;margin:0 auto;display:flex;flex-direction:column;gap:20px}
.badge{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#888}
h1{font-size:clamp(22px,5vw,34px);color:#fff;line-height:1.15;margin-bottom:8px}
p.sub{font-size:14px;color:#999;line-height:1.6}
.card{background:#111118;border:1px solid #222230;border-radius:12px;padding:20px;display:flex;flex-direction:column;gap:14px}
label{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#777;display:block;margin-bottom:5px}
textarea,input{width:100%;background:#0d0d15;border:1px solid #2a2a40;border-radius:8px;padding:10px 12px;color:#e5e5e5;font-family:'Courier New',monospace;font-size:13px;outline:none;transition:border-color .2s;resize:vertical}
textarea:focus,input:focus{border-color:#7c3aed}
.presets{display:flex;flex-wrap:wrap;gap:6px}
.preset-btn{background:#16162a;border:1px solid #2a2a40;color:#aaa;font-family:inherit;font-size:12px;padding:5px 11px;border-radius:6px;cursor:pointer;transition:all .2s}
.preset-btn:hover{border-color:#7c3aed;color:#c4b5fd}
button.primary{background:#7c3aed;border:none;color:#fff;font-family:inherit;font-size:15px;padding:12px 24px;border-radius:8px;cursor:pointer;width:100%;font-weight:600;transition:background .2s}
button.primary:hover{background:#6d28d9}
.chat-area{display:flex;flex-direction:column;gap:8px;max-height:400px;overflow-y:auto;padding:4px}
.msg{padding:10px 14px;border-radius:10px;font-size:13px;line-height:1.5}
.msg-user{background:#1e1e3a;border:1px solid #3a3a5a;margin-left:30px;text-align:right}
.msg-system{background:#0d1a0d;border:1px solid #1a3a1a;margin-right:30px;font-family:'Courier New',monospace;white-space:pre-wrap}
.msg-error{background:#1a0505;border:1px solid #7f1d1d;margin-right:30px;font-family:'Courier New',monospace;font-size:12px;color:#fca5a5}
.msg-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#555;margin-bottom:4px}
.msg-valid{font-size:10px;color:#34d399;margin-top:4px}
.msg-invalid{font-size:10px;color:#f87171;margin-top:4px}
.chat-input-row{display:flex;gap:8px}
.chat-input-row input{flex:1}
.send-btn{background:#7c3aed;border:none;color:#fff;font-family:inherit;font-size:14px;padding:10px 20px;border-radius:8px;cursor:pointer;white-space:nowrap}
.send-btn:hover{background:#6d28d9}
.stats-bar{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:#666;padding:8px 0;border-top:1px solid #1a1a2e}
.stats-bar span{color:#a78bfa}
.clear-btn{background:transparent;border:1px solid #2a2a40;color:#666;font-family:inherit;font-size:12px;padding:5px 12px;border-radius:6px;cursor:pointer;margin-left:auto}
.clear-btn:hover{color:#aaa;border-color:#444}
.cta{background:#111118;border:1px solid #7c3aed33;border-radius:12px;padding:16px;text-align:center}
.cta a{color:#c4b5fd;text-decoration:none;font-size:14px}
</style>
</head>
<body>
<div class="wrap">
  <div>
    <div class="badge">Free Developer Tool by <a href="https://svivva.com" target="_blank" style="color:#a78bfa;text-decoration:none">Svivva</a></div>
    <h1>JSON Only Chat Sandbox</h1>
    <p class="sub">Define a JSON schema, write a system prompt, then send messages. Every simulated response is validated against your schema instantly.</p>
  </div>

  <div class="card">
    <div>
      <label>Schema Presets</label>
      <div class="presets">
        <button class="preset-btn" onclick="loadPreset(0)">Basic response</button>
        <button class="preset-btn" onclick="loadPreset(1)">Sentiment analysis</button>
        <button class="preset-btn" onclick="loadPreset(2)">Bug report</button>
        <button class="preset-btn" onclick="loadPreset(3)">Intent classifier</button>
      </div>
    </div>
    <div>
      <label>System Prompt</label>
      <textarea id="sysPrompt" rows="3" placeholder="e.g. You are a helpful assistant. Always respond with valid JSON matching the schema."></textarea>
    </div>
    <div>
      <label>JSON Schema *</label>
      <textarea id="schema" rows="8" placeholder='{"type":"object","required":["ok","message"],"properties":{"ok":{"type":"boolean"},"message":{"type":"string"}}}'></textarea>
    </div>
    <button class="primary" onclick="startSession()">Start Chat Session →</button>
  </div>

  <div class="card" id="chatCard" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <label style="margin-bottom:0">Chat Session</label>
      <div class="stats-bar" style="border:none;padding:0;margin:0">
        <div>Msgs: <span id="statMsgs">0</span></div>
        <div>Valid: <span id="statValid" style="color:#34d399">0</span></div>
        <div>Invalid: <span id="statInvalid" style="color:#f87171">0</span></div>
        <button class="clear-btn" onclick="clearChat()">Clear</button>
      </div>
    </div>
    <div class="chat-area" id="chatArea">
      <div class="msg msg-system"><div class="msg-label">System</div><span id="sysDisplay"></span></div>
    </div>
    <div class="chat-input-row">
      <input type="text" id="chatInput" placeholder="Type a message and press Enter or Send…" onkeydown="if(event.key==='Enter')sendMsg()"/>
      <button class="send-btn" onclick="sendMsg()">Send</button>
    </div>
    <div class="cta">
      <a href="https://svivva.com" target="_blank">Enforce JSON-only responses in your AI pipeline with Svivva →</a>
    </div>
  </div>
</div>

<script>
const PRESETS=[
  {sys:'You are a JSON-only assistant. Always respond with valid JSON.',schema:`{
  "type": "object",
  "required": ["ok", "message"],
  "properties": {
    "ok": { "type": "boolean" },
    "message": { "type": "string" },
    "data": { "type": "object" }
  }
}`},
  {sys:'Analyze the sentiment of user messages. Respond only in JSON.',schema:`{
  "type": "object",
  "required": ["sentiment", "score"],
  "properties": {
    "sentiment": { "type": "string", "enum": ["positive", "neutral", "negative", "mixed"] },
    "score": { "type": "number", "minimum": -1, "maximum": 1 },
    "confidence": { "type": "number", "minimum": 0, "maximum": 1 }
  }
}`},
  {sys:'Generate structured bug reports from user descriptions.',schema:`{
  "type": "object",
  "required": ["title", "severity", "summary"],
  "properties": {
    "title": { "type": "string" },
    "severity": { "type": "string", "enum": ["low", "medium", "high", "critical"] },
    "summary": { "type": "string" },
    "steps": { "type": "array", "items": { "type": "string" } }
  }
}`},
  {sys:'Classify the intent of user messages.',schema:`{
  "type": "object",
  "required": ["intent", "confidence"],
  "properties": {
    "intent": { "type": "string", "enum": ["question", "complaint", "request", "feedback", "other"] },
    "confidence": { "type": "number", "minimum": 0, "maximum": 1 },
    "summary": { "type": "string" }
  }
}`},
];

function loadPreset(i){document.getElementById('sysPrompt').value=PRESETS[i].sys;document.getElementById('schema').value=PRESETS[i].schema;}

let parsedSchema=null;
let stats={msgs:0,valid:0,invalid:0};

function startSession(){
  const schemaStr=document.getElementById('schema').value.trim();
  const sys=document.getElementById('sysPrompt').value.trim();
  try{parsedSchema=JSON.parse(schemaStr);}catch(e){alert('Invalid JSON schema: '+e.message);return;}
  stats={msgs:0,valid:0,invalid:0};
  updateStats();
  document.getElementById('sysDisplay').textContent=sys||'(No system prompt)';
  document.getElementById('chatCard').style.display='flex';
  // Clear old messages except system
  const area=document.getElementById('chatArea');
  while(area.children.length>1) area.removeChild(area.lastChild);
  document.getElementById('chatCard').scrollIntoView({behavior:'smooth'});
  document.getElementById('chatInput').focus();
}

function clearChat(){
  const area=document.getElementById('chatArea');
  while(area.children.length>1) area.removeChild(area.lastChild);
  stats={msgs:0,valid:0,invalid:0};updateStats();
}

function updateStats(){
  document.getElementById('statMsgs').textContent=stats.msgs;
  document.getElementById('statValid').textContent=stats.valid;
  document.getElementById('statInvalid').textContent=stats.invalid;
}

function sendMsg(){
  const input=document.getElementById('chatInput');
  const msg=input.value.trim();
  if(!msg||!parsedSchema) return;
  input.value='';

  // Add user message
  addMsg('user',msg,'User',null);

  // Simulate AI response
  stats.msgs++;
  setTimeout(()=>{
    const {response,errors}=simulateResponse(msg,parsedSchema);
    const valid=errors.length===0;
    if(valid) stats.valid++;else stats.invalid++;
    updateStats();
    addMsg('system',JSON.stringify(response,null,2),'AI Response',errors);
  },400);
}

function simulateResponse(msg,schema){
  // Build a response that matches the schema
  const response=buildFromSchema(schema);
  // Occasionally introduce an error for realism (10% chance)
  let errors=[];
  if(Math.random()<0.1&&schema.required&&schema.required.length>0){
    const fieldToRemove=schema.required[Math.floor(Math.random()*schema.required.length)];
    delete response[fieldToRemove];
    errors=[{field:fieldToRemove,msg:`Required field "${fieldToRemove}" is missing`}];
  } else {
    errors=validateSchema(response,schema,'');
  }
  return {response,errors};
}

function buildFromSchema(schema){
  if(!schema) return null;
  if(schema.type==='object'){
    const obj={};
    if(schema.properties){
      Object.entries(schema.properties).forEach(([k,s])=>{obj[k]=buildFromSchema(s);});
    }
    return obj;
  }
  if(schema.type==='string'){
    if(schema.enum) return schema.enum[0];
    return 'Sample string value';
  }
  if(schema.type==='boolean') return true;
  if(schema.type==='number'||schema.type==='integer'){
    const min=schema.minimum??0;const max=schema.maximum??1;
    const v=min+(max-min)*0.5;
    return schema.type==='integer'?Math.round(v):parseFloat(v.toFixed(2));
  }
  if(schema.type==='array') return schema.items?[buildFromSchema(schema.items)]:[];
  return null;
}

function validateSchema(val,schema,path){
  const errs=[];
  if(!schema||typeof schema!=='object') return errs;
  if(schema.type){
    const types=Array.isArray(schema.type)?schema.type:[schema.type];
    const ok=types.some(t=>{
      if(t==='integer') return Number.isInteger(val);
      if(t==='null') return val===null;
      const actual=Array.isArray(val)?'array':typeof val;
      return actual===t;
    });
    if(!ok) errs.push({field:path||'root',msg:`Expected "${schema.type}", got "${val===null?'null':Array.isArray(val)?'array':typeof val}"`});
  }
  if(schema.enum&&!schema.enum.includes(val)) errs.push({field:path||'root',msg:`"${val}" not in enum`});
  if(typeof val==='number'){
    if(schema.minimum!==undefined&&val<schema.minimum) errs.push({field:path||'root',msg:`${val} < ${schema.minimum}`});
    if(schema.maximum!==undefined&&val>schema.maximum) errs.push({field:path||'root',msg:`${val} > ${schema.maximum}`});
  }
  if(val&&typeof val==='object'&&!Array.isArray(val)){
    (schema.required||[]).forEach(req=>{if(!(req in val)) errs.push({field:(path?path+'.':'')+req,msg:`Missing required field`});});
    if(schema.properties) Object.entries(schema.properties).forEach(([k,s])=>{if(k in val){const sub=validateSchema(val[k],s,(path?path+'.':'')+k);errs.push(...sub);}});
  }
  return errs;
}

function addMsg(type,content,role,errors){
  const area=document.getElementById('chatArea');
  const div=document.createElement('div');
  div.className='msg msg-'+type;
  let extra='';
  if(errors!==null){
    if(errors.length===0) extra='<div class="msg-valid">✓ Valid JSON — matches schema</div>';
    else extra=`<div class="msg-invalid">✗ ${errors.length} schema error${errors.length>1?'s':''}: ${errors.slice(0,2).map(e=>e.msg).join('; ')}</div>`;
  }
  div.innerHTML=`<div class="msg-label">${role}</div>${escHtml(content)}${extra}`;
  area.appendChild(div);
  area.scrollTop=area.scrollHeight;
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
</html>
