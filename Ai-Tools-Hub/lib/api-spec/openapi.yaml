openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: openai
    description: OpenAI AI chat, image, and audio operations
  - name: tools
    description: AI Tools Hub specific operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOpenaiConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"
  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOpenaiMessageBody"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}
  /openai/generate-image:
    post:
      operationId: generateOpenaiImage
      tags: [openai]
      summary: Generate an image from a text prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateOpenaiImageBody"
      responses:
        "200":
          description: Generated image data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateOpenaiImageResponse"
  /tools/summarize:
    post:
      operationId: summarizeText
      tags: [tools]
      summary: Summarize text content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SummarizeTextBody"
      responses:
        "200":
          description: SSE stream with the summary
          content:
            text/event-stream: {}
  /tools/translate:
    post:
      operationId: translateText
      tags: [tools]
      summary: Translate text to another language
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TranslateTextBody"
      responses:
        "200":
          description: SSE stream with the translation
          content:
            text/event-stream: {}
  /tools/code-explain:
    post:
      operationId: explainCode
      tags: [tools]
      summary: Explain a piece of code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExplainCodeBody"
      responses:
        "200":
          description: SSE stream with the explanation
          content:
            text/event-stream: {}
  /tools/grammar:
    post:
      operationId: checkGrammar
      tags: [tools]
      summary: Check and fix grammar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckGrammarBody"
      responses:
        "200":
          description: SSE stream with corrected text and suggestions
          content:
            text/event-stream: {}
  /tools/sentiment:
    post:
      operationId: analyzeSentiment
      tags: [tools]
      summary: Analyze sentiment of text
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeSentimentBody"
      responses:
        "200":
          description: Sentiment analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SentimentResult"
  /tools/keywords:
    post:
      operationId: extractKeywords
      tags: [tools]
      summary: Extract keywords from text
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractKeywordsBody"
      responses:
        "200":
          description: Extracted keywords
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeywordsResult"
  /tools/tone-rewrite:
    post:
      operationId: rewriteTone
      tags: [tools]
      summary: Rewrite text in a different tone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RewriteToneBody"
      responses:
        "200":
          description: SSE stream with the rewritten text
          content:
            text/event-stream: {}
  /tools/quiz:
    post:
      operationId: generateQuiz
      tags: [tools]
      summary: Generate quiz questions from text
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateQuizBody"
      responses:
        "200":
          description: Generated quiz questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizResult"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt
    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt
    CreateOpenaiConversationBody:
      type: object
      properties:
        title:
          type: string
      required:
        - title
    SendOpenaiMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content
    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
      required:
        - id
        - title
        - createdAt
        - messages
    GenerateOpenaiImageBody:
      type: object
      properties:
        prompt:
          type: string
        size:
          type: string
          enum: ["1024x1024", "512x512", "256x256"]
      required:
        - prompt
    GenerateOpenaiImageResponse:
      type: object
      properties:
        b64_json:
          type: string
      required:
        - b64_json
    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    SummarizeTextBody:
      type: object
      properties:
        text:
          type: string
        length:
          type: string
          enum: ["short", "medium", "long"]
      required:
        - text
    TranslateTextBody:
      type: object
      properties:
        text:
          type: string
        targetLanguage:
          type: string
      required:
        - text
        - targetLanguage
    ExplainCodeBody:
      type: object
      properties:
        code:
          type: string
        language:
          type: string
      required:
        - code
    CheckGrammarBody:
      type: object
      properties:
        text:
          type: string
      required:
        - text
    AnalyzeSentimentBody:
      type: object
      properties:
        text:
          type: string
      required:
        - text
    SentimentResult:
      type: object
      properties:
        sentiment:
          type: string
          enum: ["positive", "negative", "neutral", "mixed"]
        score:
          type: number
        explanation:
          type: string
        emotions:
          type: array
          items:
            type: string
      required:
        - sentiment
        - score
        - explanation
        - emotions
    ExtractKeywordsBody:
      type: object
      properties:
        text:
          type: string
        count:
          type: integer
      required:
        - text
    KeywordsResult:
      type: object
      properties:
        keywords:
          type: array
          items:
            type: object
            properties:
              word:
                type: string
              relevance:
                type: number
            required:
              - word
              - relevance
      required:
        - keywords
    RewriteToneBody:
      type: object
      properties:
        text:
          type: string
        tone:
          type: string
          enum: ["professional", "casual", "formal", "friendly", "persuasive", "empathetic"]
      required:
        - text
        - tone
    GenerateQuizBody:
      type: object
      properties:
        text:
          type: string
        count:
          type: integer
      required:
        - text
    QuizQuestion:
      type: object
      properties:
        question:
          type: string
        options:
          type: array
          items:
            type: string
        correctAnswer:
          type: integer
        explanation:
          type: string
      required:
        - question
        - options
        - correctAnswer
        - explanation
    QuizResult:
      type: object
      properties:
        questions:
          type: array
          items:
            $ref: "#/components/schemas/QuizQuestion"
      required:
        - questions
