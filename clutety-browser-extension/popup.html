<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Clutety Feed Shield</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        width: 280px;
        margin: 0;
        padding: 14px;
        background: #080c14;
        color: #e8ecf4;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 8px;
        color: #5ba8a0;
      }
      p {
        font-size: 11px;
        line-height: 1.5;
        color: rgba(255, 255, 255, 0.55);
        margin: 0 0 12px;
      }
      a {
        color: #5ba8a0;
        font-size: 11px;
        font-weight: 700;
      }
      #status {
        font-size: 11px;
        padding: 8px;
        border-radius: 6px;
        background: rgba(91, 168, 160, 0.12);
        border: 1px solid rgba(91, 168, 160, 0.3);
      }
    </style>
  </head>
  <body>
    <h1>Clutety Feed Shield</h1>
    <p>
      Hides blocked people and topics on YouTube, TikTok, Instagram, X, Reddit, and more.
      Configure rules on Svivva, then revisit this page to sync.
    </p>
    <div id="status">Loading…</div>
    <p style="margin-top: 12px">
      <a href="https://svivva.com/clutety/app" target="_blank" rel="noopener">Open Clutety on Svivva →</a>
    </p>
    <script src="popup.js"></script>
  </body>
</html>
